# LanceDB memory plugin — default configuration.
#
# This file is the single source of the plugin's default settings. To configure
# the plugin, copy the blocks below into your ~/.hermes/config.yaml and edit to
# taste — that file is the one place you set things, and its values override
# these defaults. Do not edit this file to change your own setup (a plugin
# update overwrites it).
#
# `hermes memory setup` seeds ~/.hermes/config.yaml from these defaults; you can
# also just copy-paste.

# Activate the plugin (Hermes-level setting, not under plugins.lancedb):
memory:
  provider: lancedb

plugins:
  lancedb:
    embedding:
      # Embeddings go through an OpenAI-compatible client. The default below is
      # OpenAI, but you can point it at ANY OpenAI-compatible embeddings endpoint
      # without code changes — just set `base_url` + `api_key_env` (and `model`).
      # Verified examples:
      #   OpenRouter  base_url: https://openrouter.ai/api/v1  api_key_env: OPENROUTER_API_KEY  model: google/gemini-embedding-001
      #   Ollama      base_url: http://localhost:11434/v1     api_key_env: OLLAMA_API_KEY      model: nomic-embed-text
      # Also works with Nous, Together, vLLM, LM Studio, or any self-hosted server
      # that speaks the OpenAI embeddings shape. NOTE: changing the model (or its
      # dimension) against an existing store requires recreating the table.
      provider: openai                # label; currently selects the OpenAI-compatible client
      model: text-embedding-3-small   # 1536-dim; requires OPENAI_API_KEY
      base_url: null                  # null = OpenAI default; set to an OpenAI-compatible endpoint to switch providers
      api_key_env: OPENAI_API_KEY     # env var holding the API key (e.g. OPENROUTER_API_KEY when base_url is OpenRouter)
      dimensions: null                # optional output dims (matryoshka text-embedding-3-* models)
      max_batch: 100                  # max inputs per request; provider cap (Gemini 100, Cohere 96, OpenAI up to 2048)

    retrieval:
      # mode: vector (default) or hybrid (per-call override via the recall tool's `mode`).
      # Default is pure vector: lightest path (no reranker / sentence-transformers),
      # and it outperformed RRF hybrid in our LongMemEval benchmark. Switch to
      # `hybrid` (and pick a `reranker.type` below) to add lexical matching.
      # (A lexical-only `fts` mode also exists but is a niche, unrecommended option.)
      mode: vector
      top_k: 10
      search_kinds: [fact]      # row kinds recall returns; "turn" rows are provenance/fallback

      reranker:
        # Hybrid fusion strategy (no-op for vector/fts, which have one ranked list):
        #   rrf           — Reciprocal Rank Fusion (rank-based, equal-weight legs).
        #   linear        — weighted vector + FTS scores; `weight` is the vector weight.
        #   cross-encoder — rerank the candidate pool with a sentence-transformers model.
        type: rrf
        weight: 0.7             # linear only: vector weight (0-1); higher = more vector
        model: cross-encoder/ettin-reranker-17m-v1   # cross-encoder only
        rerank_top_n: 50        # cross-encoder only: candidate pool size (>= top_k)

    extraction:
      enabled: true             # set false to disable LLM fact extraction at session boundaries
      min_turns: 3              # skip extraction for very short sessions

    maintenance:
      enabled: true             # background optimize() of the Lance table
      optimize_every_commits: 50
      cleanup_older_than_days: 7
